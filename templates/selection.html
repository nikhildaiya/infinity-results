<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Infinity Results | Student Results & Analytics</title>
        <meta name="author" content="Nikhil Daiya" />
        <meta name="description" content="Instantly search, filter, and analyze your college results for your course. View top 10 ranks and visualize student and subject performance with detailed charts." />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/infinity.ico') }}">
        <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/infinity-16.png') }}">
        <link rel="icon" type="image/png" sizes="24x24" href="{{ url_for('static', filename='images/infinity-24.png') }}">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/infinity-32.png') }}">
        <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='images/infinity-64.png') }}">
        <link rel="icon" type="image/png" sizes="128x128" href="{{ url_for('static', filename='images/infinity-128.png') }}">
        <link rel="icon" type="image/png" sizes="256x256" href="{{ url_for('static', filename='images/infinity-256.png') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/selection.css') }}">
    </head>
    <body class="d-flex flex-column min-vh-100" style="user-select:none;">
        <nav class="navbar py-2" style="background-color:#008898;">
            <div class="container-xl">
                <a class="navbar-brand fw-bold text-white fs-6 fs-sm-5 fs-md-4 lh-1" href="/">Infinity Results</a>
            </div>
        </nav>
        <header class="hero-header text-white">
            <div class="container-xl px-4 text-center">
                <img src="{{ url_for('static', filename='images/hero.png') }}" alt="Infinity Logo" class="img-fluid hero-image" draggable="false">
                <p class="hero-text mt-3 mb-0 fw-normal">Search, filter, rank, and visualize your complete course results in one place</p>
            </div>
        </header>
        <main class="flex-grow-1 py-4 py-md-5">
            <div class="container" style="max-width: 600px;">
                <form id="selectionForm" action="{{ url_for('redirect_to_dashboard') }}" method="GET">
                    <div class="mb-4 form-field">
                        <label for="levelSelect" class="form-label form-label-responsive fw-bold">Select Course Level</label>
                        <select class="form-select form-select-responsive" id="levelSelect" name="level" required>
                            <option value="" selected disabled>-- Choose a level --</option>
                            <option value="Undergraduate">Undergraduate</option>
                            <option value="Postgraduate">Postgraduate</option>
                        </select>
                    </div>
                    <div class="mb-4 form-field">
                        <label for="courseSelect" class="form-label form-label-responsive fw-bold">Select Course</label>
                        <select class="form-select form-select-responsive" id="courseSelect" name="course" required disabled>
                            <option value="" selected>-- Select level first --</option>
                        </select>
                    </div>
                    <div class="mb-4 form-field">
                        <label for="semesterSelect" class="form-label form-label-responsive fw-bold">Select Semester</label>
                        <select class="form-select form-select-responsive" id="semesterSelect" name="semester" required disabled>
                            <option value="" selected>-- Select course first --</option>
                        </select>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" id="proceedButton" class="btn btn-primary btn-responsive" disabled>Proceed</button>
                    </div>
                </form>
            </div>
        </main>
        <footer class="bg-dark py-3 py-md-4">
            <div class="container-xl text-center text-white">
                <p class="mb-0 fw-light footer-text">This website does not hold copyright over the data.</p>
                <p class="mb-0 fw-light footer-text">Results are sourced from the official college website and are updated only after official publication.</p>
            </div>
        </footer>
        <script>
            const courseData = JSON.parse('{{ course_data_json | safe }}');
            const levelSelect = document.getElementById('levelSelect');
            const courseSelect = document.getElementById('courseSelect');
            const semesterSelect = document.getElementById('semesterSelect');
            const proceedButton = document.getElementById('proceedButton');

            levelSelect.addEventListener('change', function() {
                const selectedLevel = this.value;
                courseSelect.innerHTML = '<option value="" selected>-- Choose a course --</option>';
                semesterSelect.innerHTML = '<option value="" selected>-- Select course first --</option>';
                courseSelect.disabled = true;
                semesterSelect.disabled = true;
                proceedButton.disabled = true;

                if (selectedLevel && courseData[selectedLevel]) {
                    courseSelect.disabled = false;
                    for (const courseKey in courseData[selectedLevel]) {
                        const course = courseData[selectedLevel][courseKey];
                        const option = new Option(course.name, courseKey);
                        courseSelect.add(option);
                    }
                }
            });

            courseSelect.addEventListener('change', function() {
                const selectedLevel = levelSelect.value;
                const selectedCourseKey = this.value;
                
                semesterSelect.innerHTML = '<option value="" selected>-- Select semester --</option>';
                semesterSelect.disabled = true;
                proceedButton.disabled = true;

                if (selectedCourseKey && courseData[selectedLevel] && courseData[selectedLevel][selectedCourseKey]) {
                    semesterSelect.disabled = false;
                    const semesters = courseData[selectedLevel][selectedCourseKey].semesters;
                    
                    semesters.forEach(function(sem) {
                        const option = new Option(sem, sem);
                        semesterSelect.add(option);
                    });
                }
            });

            semesterSelect.addEventListener('change', function() {
                proceedButton.disabled = !this.value;
            });

            window.addEventListener('pageshow', function () {
                if (levelSelect.value) {
                    levelSelect.dispatchEvent(new Event('change'));
                }
                if (courseSelect.value) {
                    courseSelect.dispatchEvent(new Event('change'));
                }
                if (semesterSelect.value) {
                    proceedButton.disabled = false;
                }
            });
        </script>
    </body>
</html>
