<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>{{ course|replace("-", " ")|upper }} {{ semester }} | Results Dashboard</title>
        <meta name="author" content="Nikhil Daiya" />
        <meta name="description" content="The dashboard for {{ course|replace('-', ' ')|upper }} {{ semester }}. Access all results, top 10 ranks, performance charts, and student search." />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/infinity.ico') }}">
        <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/infinity-16.png') }}">
        <link rel="icon" type="image/png" sizes="24x24" href="{{ url_for('static', filename='images/infinity-24.png') }}">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/infinity-32.png') }}">
        <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='images/infinity-64.png') }}">
        <link rel="icon" type="image/png" sizes="128x128" href="{{ url_for('static', filename='images/infinity-128.png') }}">
        <link rel="icon" type="image/png" sizes="256x256" href="{{ url_for('static', filename='images/infinity-256.png') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <style>
            .footer-text {
                font-size: 0.75rem;
            }
            @media (min-width: 768px) {
                .footer-text {
                    font-size: 0.875rem;
                }
            }
            .page-header {
                background-color: #008898;
                padding: 4rem 0;
            }
            .page-title {
                font-size: 1.2rem;
            }
            @media (min-width: 768px) {
                .page-header {
                    padding: 4rem 0;
                }
                .page-title {
                    font-size: 2rem;
                }
            }
            .custom-btn, .custom-btn:hover, .custom-btn:focus, .custom-btn:active {
                background-color: #008898;
                color: #ffffff;
                border-color: #008898;
            }
            .action-title {
                font-size: 1rem;
            }
            @media (min-width: 768px) {
                .action-title {
                    font-size: 1.25rem;
                }
            }
            @media (max-width: 575.98px) {
                .action-btn-wrap {
                    max-width: 90%;
                    margin-left: auto;
                    margin-right: auto;
                }
            }
            @media (max-width: 575.98px) {
                .action-wrap {
                    max-width: 90%;
                    margin-left: auto;
                    margin-right: auto;
                }
            }
            @media (max-width: 575.98px) {
                .custom-btn {
                    font-size: 0.9rem;
                    padding: 0.45rem 0.75rem;
                }
            }
        </style>
    </head>
    <body class="d-flex flex-column min-vh-100" style="user-select:none;">
        <nav class="navbar py-2" style="background-color:#008898;">
            <div class="container-xl">
                <a class="navbar-brand fw-bold text-white fs-6 fs-sm-5 fs-md-4 lh-1" href="/">Infinity Results</a>
            </div>
        </nav>
        <header class="page-header text-white">
            <div class="container-xl px-4 text-center">
                <h1 class="page-title fw-bold mb-0">{{ display_name }}</h1>
            </div>
        </header>
        <main class="flex-grow-1 py-4 py-md-5 pt-5 pt-md-5">
            <div class="container-xl px-4">
                <h2 class="action-title fw-semibold mb-4 action-wrap">Select Action</h2>
                <div class="row g-3 justify-content-center">
                    <div class="col-12 col-md-3 action-btn-wrap">
                        <a href="{{ url_for('all_results', course_name=course, semester=semester) }}" class="btn custom-btn w-100 py-2 fw-semibold">All Results</a>
                    </div>
                    <div class="col-12 col-md-3 action-btn-wrap">
                        <a href="{{ url_for('top_10', course_name=course, semester=semester) }}" class="btn custom-btn w-100 py-2 fw-semibold">Top 10 Ranks</a>
                    </div>
                    <div class="col-12 col-md-3 action-btn-wrap">
                        <a href="{{ url_for('charts', course_name=course, semester=semester) }}" class="btn custom-btn w-100 py-2 fw-semibold">Charts &amp; Stats</a>
                    </div>
                    <div class="col-12 col-md-3 action-btn-wrap">
                        <a href="{{ url_for('search', course_name=course, semester=semester) }}" class="btn custom-btn w-100 py-2 fw-semibold">Search Results</a>
                    </div>
                </div>
            </div>
        </main>
        <footer class="bg-dark py-3 py-md-4">
            <div class="container-xl text-center text-white">
                <p class="mb-0 fw-light footer-text">This website does not hold copyright over the data.</p>
                <p class="mb-0 fw-light footer-text">Results are sourced from the official college website and are updated only after official publication.</p>
            </div>
        </footer>
    </body>
</html>
